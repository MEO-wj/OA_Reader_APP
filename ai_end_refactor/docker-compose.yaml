services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: ai_workflow
      POSTGRES_PASSWORD: ai_workflow
      POSTGRES_DB: ai_workflow
    ports:
      - "5431:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_workflow -d ai_workflow"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ai_workflow
      DB_PASSWORD: ai_workflow
      DB_NAME: ai_workflow
      SKILLS_DIR: ./skills
      AUTO_MIGRATE: "true"
      AUTO_IMPORT: "false"
    command: >
      uv run uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir src
      --reload-dir static
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    restart: always

volumes:
  postgres_data:
  
