# AI End - 仅运行 API 服务
# 数据库通过 .env 文件配置外部 PostgreSQL (pgvector) 连接
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SKILLS_DIR: ./skills
    command: >
      uv run uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir src
      --reload-dir static
    ports:
      - "4421:8000"
    volumes:
      - .:/app
    working_dir: /app
    restart: always
