name: APP EAS Build (Main)

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: eas-build-main
  cancel-in-progress: false

env:
  APP_PATH: OAP-app

jobs:
  build-app-eas:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: https://gitea.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: https://gitea.com/actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install EAS CLI
        run: |
          npm install -g eas-cli@latest

      - name: Install app dependencies
        working-directory: ${{ env.APP_PATH }}
        run: |
          set -euo pipefail
          npm ci

      - name: Verify Expo auth
        working-directory: ${{ env.APP_PATH }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required"
            exit 1
          fi
          eas whoami

      - name: Trigger EAS build (non-blocking)
        id: eas_build
        working-directory: ${{ env.APP_PATH }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          BUILD_JSON=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --no-wait \
            --json)

          echo "$BUILD_JSON" > /tmp/eas-build.json

          BUILD_ID=$(jq -r 'if type=="array" then (.[0].id // empty) else (.id // empty) end' /tmp/eas-build.json)
          BUILD_PAGE_URL=$(jq -r 'if type=="array" then (.[0].buildDetailsPageUrl // empty) else (.buildDetailsPageUrl // empty) end' /tmp/eas-build.json)

          if [ -z "$BUILD_ID" ]; then
            echo "Failed to get build ID from EAS output"
            cat /tmp/eas-build.json
            exit 1
          fi

          mkdir -p /tmp/eas-meta
          cat > /tmp/eas-meta/eas-build-meta.json <<EOF
          {
            "build_id": "$BUILD_ID",
            "build_page_url": "$BUILD_PAGE_URL",
            "tag": "${GITHUB_REF_NAME}",
            "platform": "android",
            "profile": "production",
            "branch": "main"
          }
          EOF

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_page_url=$BUILD_PAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Build summary
        run: |
          set -euo pipefail
          echo "## EAS Build Triggered (Main)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build ID: \`${{ steps.eas_build.outputs.build_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Details: ${{ steps.eas_build.outputs.build_page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next**: After build completes, run \`Collect Build (Main)\` workflow with the build ID above to download APK and create release." >> "$GITHUB_STEP_SUMMARY"
